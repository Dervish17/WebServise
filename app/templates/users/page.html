{% extends "base.html" %}

{% block title %}Пользователи{% endblock %}

{% block content %}
<h2 class="mb-4 text-2xl font-bold text-slate-800">Пользователи</h2>

<form
    id="create-user-form"
    hx-post="/app/users/create"
    hx-target="#create-user-result"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()"
    class="mb-5 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">

    <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
        <div>
            <label class="mb-1 block font-semibold text-slate-700">Фамилия</label>
            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="text" name="last_name">
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Имя</label>
            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="text" name="first_name">
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Отчество</label>
            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="text" name="middle_name">
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Email</label>
            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="email" name="email" required>
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Пароль</label>
            <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="password" name="password" required>
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Роль</label>
            <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" name="role" required>
                <option value="admin">admin</option>
                <option value="manager">manager</option>
                <option value="engineer">engineer</option>
            </select>
        </div>
    </div>

    <div class="mt-4">
        <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
            Создать пользователя
        </button>
    </div>

    <div id="create-user-result" class="mt-3"></div>
</form>

<div
    id="users-table"
    hx-get="/app/users/table"
    hx-trigger="load, refreshUsers from:body"
    hx-swap="innerHTML">
    Загрузка...
</div>

<div id="user-edit-modal" class="mt-5"></div>
{% endblock %}
