{% extends "base.html" %}

{% block title %}Пользователи{% endblock %}

{% block content %}
<h2 class="mb-4 text-2xl font-bold text-slate-800">Пользователи</h2>

<details class="compact-create mb-4 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm group">
    <summary class="flex cursor-pointer items-center justify-between bg-slate-50 px-4 py-3 transition hover:bg-slate-100">
        <div class="flex items-center gap-3">
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-blue-100 text-sm font-bold text-blue-700">
                +
            </span>
            <div>
                <div class="font-semibold text-slate-800">Создать пользователя</div>
                <div class="text-xs text-slate-500">Форма добавления нового сотрудника</div>
            </div>
        </div>

        <div class="text-sm font-medium text-blue-600">
            <span class="group-open:hidden">Развернуть</span>
            <span class="hidden group-open:inline">Свернуть</span>
        </div>
    </summary>

    <div class="border-t border-slate-200 px-5 py-5">
        <form
            id="create-user-form"
            hx-post="/app/users/create"
            hx-target="#create-user-result"
            hx-swap="innerHTML"
            hx-on::after-request="if(event.detail.successful) this.reset()">

            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Фамилия</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="text"
                        name="last_name">
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Имя</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="text"
                        name="first_name">
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Отчество</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="text"
                        name="middle_name">
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Email</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="email"
                        name="email"
                        required>
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Пароль</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="password"
                        name="password"
                        required>
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Роль</label>
                    <select
                        class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        name="role"
                        required>
                        <option value="admin">Администратор</option>
                        <option value="manager">Менеджер</option>
                        <option value="engineer">Инженер</option>
                    </select>
                </div>
            </div>

            <div class="mt-4">
                <button
                    type="submit"
                    class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
                    Создать пользователя
                </button>
            </div>

            <div id="create-user-result" class="mt-3"></div>
        </form>
    </div>
</details>

<div id="users-alert" class="mb-4"></div>

<div
    id="users-table"
    hx-get="/app/users/table"
    hx-trigger="load, refreshUsers from:body"
    hx-swap="innerHTML">
    Загрузка...
</div>

<div id="user-edit-modal" class="mt-5"></div>
{% endblock %}
