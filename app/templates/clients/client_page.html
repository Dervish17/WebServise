{% extends "base.html" %}

{% block title %}Клиент #{{ client.id }}{% endblock %}

{% block content %}
<div style="max-width: 760px; margin: 0 auto;">

    <div style="margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap;">
        <a
            href="/app/clients"
            style="text-decoration: none; color: #2563eb; font-weight: 600;">
            ← Назад к клиентам
        </a>

        <a
            href="/app/orders"
            style="text-decoration: none; color: #2563eb; font-weight: 600;">
            ← К заявкам
        </a>
    </div>

    <div id="client-detail" class="order-detail-wrap">
        {% set standalone = True %}
        {% include "clients/_detail.html" %}
    </div>
</div>
{% endblock %}
