{% extends "base.html" %}

{% block title %}Клиент #{{ client.id }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-4 flex flex-wrap gap-3">
        <a
            href="/app/clients"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← Назад к клиентам
        </a>

        <a
            href="/app/orders"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← К заявкам
        </a>
    </div>

    <div id="client-detail" class="rounded-xl bg-white p-5 shadow-sm">
        {% set standalone = True %}
        {% include "clients/_detail.html" %}
    </div>
</div>
{% endblock %}
