<h3 class="detail-title">Редактирование клиента #{{ client.id }}</h3>

<form
    hx-post="/app/clients/{{ client.id }}/edit"
    hx-target="#client-detail"
    hx-swap="innerHTML">

    <div class="detail-row">
        <label><strong>Название</strong></label>
        <input class="select full-width" type="text" name="name" value="{{ client.name }}" required>
    </div>

    <div class="detail-row">
        <label><strong>Контактное лицо</strong></label>
        <input class="select full-width" type="text" name="contact_person" value="{{ client.contact_person or '' }}">
    </div>

    <div class="detail-row">
        <label><strong>Телефон</strong></label>
        <input class="select full-width" type="text" name="phone" value="{{ client.phone or '' }}">
    </div>

    <div class="detail-row">
        <label><strong>Email</strong></label>
        <input class="select full-width" type="email" name="email" value="{{ client.email or '' }}">
    </div>

    <div class="detail-row">
        <label><strong>Адрес</strong></label>
        <textarea class="textarea full-width" name="address" rows="2">{{ client.address or '' }}</textarea>
    </div>

    <div class="detail-row">
        <label><strong>Заметки</strong></label>
        <textarea class="textarea full-width" name="notes" rows="3">{{ client.notes or '' }}</textarea>
    </div>

    <div class="detail-actions">
        <button type="submit" class="button button-blue">Сохранить</button>
        <button
            type="button"
            class="button button-dark"
            hx-get="/app/clients/{{ client.id }}/detail"
            hx-target="#client-detail"
            hx-swap="innerHTML">
            Отмена
        </button>
    </div>
</form>
