{% extends "base.html" %}

{% block title %}Клиенты{% endblock %}

{% block content %}
<h2 class="mb-4 text-2xl font-bold text-slate-800">Клиенты</h2>

<form
    hx-post="/app/clients/create"
    hx-target="#clients-table"
    hx-swap="innerHTML"
    class="mb-5 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">

    <h3 class="mb-4 text-lg font-semibold text-slate-800">Создание клиента</h3>

    <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
        <div>
            <label class="mb-1 block font-semibold text-slate-700">Название клиента</label>
            <input
                class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                type="text"
                name="name"
                required>
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Контактное лицо</label>
            <input
                class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                type="text"
                name="contact_person">
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Телефон</label>
            <input
                class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                type="text"
                name="phone">
        </div>

        <div>
            <label class="mb-1 block font-semibold text-slate-700">Email</label>
            <input
                class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                type="email"
                name="email">
        </div>
    </div>

    <div class="mt-4">
        <label class="mb-1 block font-semibold text-slate-700">Адрес</label>
        <textarea
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            name="address"
            rows="2"></textarea>
    </div>

    <div class="mt-4">
        <label class="mb-1 block font-semibold text-slate-700">Заметки</label>
        <textarea
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            name="notes"
            rows="2"></textarea>
    </div>

    <div class="mt-4">
        <button
            type="submit"
            class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
            Добавить клиента
        </button>
    </div>
</form>
<div class="mb-4 flex flex-wrap items-end gap-3">
    <div class="min-w-[280px] flex-1">
        <label for="client-search" class="mb-1 block font-semibold text-slate-700">Поиск по клиентам</label>
        <input
            id="client-search"
            name="search"
            type="text"
            placeholder="Название, контактное лицо, телефон, email..."
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            hx-get="/app/clients/table"
            hx-trigger="input changed delay:400ms"
            hx-target="#clients-table"
            hx-swap="innerHTML"
            hx-include="#client-sort">
    </div>

    <div>
        <label for="client-sort" class="mb-1 block font-semibold text-slate-700">Сортировка</label>
        <select
            id="client-sort"
            name="sort"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            hx-get="/app/clients/table"
            hx-target="#clients-table"
            hx-swap="innerHTML"
            hx-include="#client-search">
            <option value="newest">Сначала новые</option>
            <option value="oldest">Сначала старые</option>
            <option value="name_asc">По названию А-Я</option>
            <option value="name_desc">По названию Я-А</option>
        </select>
    </div>
</div>
<div class="flex items-start gap-5 h-[calc(100vh-160px)]">
    <div
        id="clients-table"
        class="flex-[2] overflow-auto"
        hx-get="/app/clients/table"
        hx-trigger="load, refreshClients from:body"
        hx-swap="innerHTML">
        Загрузка...
    </div>

    <div
        id="client-detail"
        class="min-w-[320px] flex-1 overflow-y-auto rounded-xl bg-white p-4 shadow-sm h-full">
        Выбери клиента
    </div>
</div>
{% endblock %}
