{% extends "base.html" %}

{% block title %}403 - Доступ запрещён{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <div class="rounded-xl border border-red-200 bg-white p-8 shadow-sm">
        <div class="mb-4 text-sm font-semibold uppercase tracking-wide text-red-600">
            Ошибка 403
        </div>

        <h2 class="mb-3 text-3xl font-bold text-slate-800">
            Доступ запрещён
        </h2>

        <p class="mb-6 text-slate-600">
            У вас нет прав для просмотра этой страницы или выполнения этого действия.
        </p>

        <div class="flex flex-wrap gap-3">
            <a
                href="/app/orders"
                class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
                К заявкам
            </a>

            <a
                href="/app/profile"
                class="rounded-lg bg-slate-700 px-4 py-2 font-medium text-white transition hover:bg-slate-800">
                Мой профиль
            </a>
        </div>
    </div>
</div>
{% endblock %}
