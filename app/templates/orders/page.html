{% extends "base.html" %}

{% block title %}Заявки{% endblock %}

{% block content %}
<h2 class="mb-4 text-2xl font-bold text-slate-800">Список заявок</h2>

{% if can_manage(request.state.current_user) %}
<details class="compact-create mb-4 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm group">
    <summary class="flex cursor-pointer items-center justify-between bg-slate-50 px-4 py-3 transition hover:bg-slate-100">
        <div class="flex items-center gap-3">
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-blue-100 text-sm font-bold text-blue-700">
                +
            </span>
            <div>
                <div class="font-semibold text-slate-800">Создать заявку</div>
                <div class="text-xs text-slate-500">Форма добавления новой заявки</div>
            </div>
        </div>

        <div class="text-sm font-medium text-blue-600">
            <span class="group-open:hidden">Развернуть</span>
            <span class="hidden group-open:inline">Свернуть</span>
        </div>
    </summary>

    <div class="border-t border-slate-200 px-5 py-5">
        <form
            id="create-order-form"
            hx-post="/app/orders/create"
            hx-target="#create-order-result"
            hx-swap="innerHTML"
            hx-on::after-request="if(event.detail.successful) this.reset()">

            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                <div class="md:col-span-2">
                    <label class="mb-1 block font-semibold text-slate-700">Название заявки</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="text"
                        name="title"
                        minlength="1"
                        maxlength="255"
                        required>
                </div>

                <div class="md:col-span-2">
                    <label class="mb-1 block font-semibold text-slate-700">Описание</label>
                    <textarea
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        name="description"
                        rows="3"></textarea>
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Оборудование</label>
                    <select
                        class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        name="equipment_id"
                        required>
                        <option value="">Выбери оборудование</option>
                        {% for equipment in equipments %}
                            <option value="{{ equipment.id }}">
                                #{{ equipment.id }} — {{ equipment.name or "Без названия" }}
                                {% if equipment.client %} ({{ equipment.client.name }}){% endif %}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="mb-1 block font-semibold text-slate-700">Стоимость</label>
                    <input
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
                        type="number"
                        step="0.01"
                        min="0"
                        name="total_cost">
                </div>
            </div>

            <div class="mt-4">
                <button
                    type="submit"
                    class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
                    Создать заявку
                </button>
            </div>

            <div id="create-order-result" class="mt-3"></div>
        </form>
    </div>
</details>
{% endif %}

<div class="mb-4 flex flex-wrap items-end gap-3">
    <div>
        <label for="status" class="mb-1 block font-semibold text-slate-700">Статус</label>
        <select
            id="status"
            name="status"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            hx-get="/app/orders/table"
            hx-target="#orders-table"
            hx-swap="innerHTML"
            hx-include="#order-search, #order-sort">
            <option value="">Все</option>
            <option value="new">Новая</option>
            <option value="diagnostics">Диагностика</option>
            <option value="estimate_approved">Смета согласована</option>
            <option value="in_progress">В работе</option>
            <option value="done">Выполнена</option>
            <option value="awaiting_payment">Ожидание оплаты</option>
            <option value="closed">Закрыта</option>
        </select>
    </div>

    <div class="min-w-[280px] flex-1">
        <label for="order-search" class="mb-1 block font-semibold text-slate-700">Поиск по заявкам</label>
        <input
            id="order-search"
            name="search"
            type="text"
            placeholder="Название, описание..."
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            hx-get="/app/orders/table"
            hx-trigger="input changed delay:400ms"
            hx-target="#orders-table"
            hx-swap="innerHTML"
            hx-include="#status, #order-sort">
    </div>

    <div>
        <label for="order-sort" class="mb-1 block font-semibold text-slate-700">Сортировка</label>
        <select
            id="order-sort"
            name="sort"
            class="rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            hx-get="/app/orders/table"
            hx-target="#orders-table"
            hx-swap="innerHTML"
            hx-include="#status, #order-search">
            <option value="newest">Сначала новые</option>
            <option value="oldest">Сначала старые</option>
        </select>
    </div>
</div>

<div class="flex items-start gap-5 h-[calc(100vh-160px)]">
    <div
        id="orders-table"
        class="flex-[2] overflow-auto"
        hx-get="/app/orders/table"
        hx-trigger="load, refreshOrders from:body"
        hx-swap="innerHTML">
        Загрузка...
    </div>

    <div
        id="order-detail"
        class="min-w-[320px] flex-1 overflow-y-auto rounded-xl bg-white p-4 shadow-sm h-full">
        Выбери заявку
    </div>
</div>
{% endblock %}
