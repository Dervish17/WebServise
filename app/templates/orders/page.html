{% extends "base.html" %}

{% block title %}Заявки{% endblock %}

{% block content %}
<h2 class="mb-4 text-2xl font-bold text-slate-800">Список заявок</h2>

<form
    id="create-order-form"
    hx-post="/app/orders/create"
    hx-target="#create-order-result"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()"
    class="mb-5 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">

    <div class="mb-4">
        <label class="mb-1 block font-semibold text-slate-700">Название заявки</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="text" name="title" required>
    </div>

    <div class="mb-4">
        <label class="mb-1 block font-semibold text-slate-700">Описание</label>
        <textarea class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" name="description" rows="3"></textarea>
    </div>

    <div class="mb-4">
        <label class="mb-1 block font-semibold text-slate-700">Оборудование</label>
        <select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" name="equipment_id" required>
            <option value="">Выбери оборудование</option>
            {% for equipment in equipments %}
                <option value="{{ equipment.id }}">
                    #{{ equipment.id }} — {{ equipment.name or "Без названия" }}
                    {% if equipment.client %} ({{ equipment.client.name }}){% endif %}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-4">
        <label class="mb-1 block font-semibold text-slate-700">Стоимость</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100" type="number" step="0.01" name="total_cost">
    </div>

    <div class="mb-3">
        <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
            Создать заявку
        </button>
    </div>

    <div id="create-order-result"></div>
</form>

<div class="mb-4 flex items-center gap-2">
    <label for="status" class="font-semibold text-slate-700">Статус:</label>
    <select
        id="status"
        name="status"
        class="rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
        hx-get="/app/orders/table"
        hx-target="#orders-table"
        hx-swap="innerHTML">
        <option value="">Все</option>
        <option value="new">Новая</option>
        <option value="in_progress">В работе</option>
        <option value="done">Выполнена</option>
    </select>
</div>

<div class="flex items-start gap-5">
    <div
        id="orders-table"
        class="flex-[2]"
        hx-get="/app/orders/table"
        hx-trigger="load, refreshOrders from:body"
        hx-swap="innerHTML">
        Загрузка...
    </div>

    <div id="order-detail" class="min-w-[320px] flex-1 rounded-xl bg-white p-4 shadow-sm">
        Выбери заявку
    </div>
</div>
{% endblock %}
