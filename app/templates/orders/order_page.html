{% extends "base.html" %}

{% block title %}Заявка #{{ order.id }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-4 flex flex-wrap gap-3">
        <a
            href="/app/orders"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← Назад к заявкам
        </a>

        <a
            href="/app/clients"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← К списку клиентов
        </a>

        <a
            href="/app/clients/{{ order.client_id }}/page"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← К клиенту
        </a>
    </div>

    <div id="order-detail" class="rounded-xl bg-white p-5 shadow-sm">
        {% set standalone = True %}
        {% include "orders/_detail.html" %}
    </div>
</div>
{% endblock %}
