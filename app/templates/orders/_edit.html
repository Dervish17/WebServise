<h3 class="mb-4 text-xl font-bold text-slate-800">Редактирование заявки #{{ order.id }}</h3>

<form
    hx-post="/app/orders/{{ order.id }}/edit"
    hx-target="#order-detail"
    hx-swap="innerHTML">

    <div class="mb-3">
        <label class="mb-1 block font-semibold text-slate-700">Название</label>
        <input
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            type="text"
            name="title"
            value="{{ order.title }}"
            minlength="1"
            maxlength="255"
            required>
    </div>

    <div class="mb-3">
        <label class="mb-1 block font-semibold text-slate-700">Описание</label>
        <textarea
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            name="description"
            rows="4">{{ order.description or '' }}</textarea>
    </div>

    <div class="mb-4">
        <label class="mb-1 block font-semibold text-slate-700">Стоимость</label>
        <input
            class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
            type="number"
            step="0.01"
            min="0"
            name="total_cost"
            value="{{ order.total_cost if order.total_cost is not none else '' }}">
    </div>

    <div class="flex flex-wrap gap-2">
        <button
            type="submit"
            class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">
            Сохранить
        </button>

        <button
            type="button"
            class="rounded-lg bg-slate-700 px-4 py-2 font-medium text-white transition hover:bg-slate-800"
            hx-get="/app/orders/{{ order.id }}/detail"
            hx-target="#order-detail"
            hx-swap="innerHTML">
            Отмена
        </button>
    </div>
</form>
