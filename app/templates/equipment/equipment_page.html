{% extends "base.html" %}

{% block title %}Оборудование #{{ equipment.id }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
    <div class="mb-4 flex flex-wrap gap-3">
        <a
            href="/app/equipment"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← Назад к оборудованию
        </a>

        <a
            href="/app/clients/{{ equipment.client_id }}/page"
            class="font-semibold text-blue-600 hover:text-blue-700">
            ← К клиенту
        </a>
    </div>

    <div id="equipment-detail" class="rounded-xl bg-white p-5 shadow-sm">
        {% set standalone = True %}
        {% include "equipment/_detail.html" %}
    </div>
</div>
{% endblock %}
